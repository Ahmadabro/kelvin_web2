<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThermoAI — Interactive Assistant</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="background-decor blob-1"></div>
    <div class="background-decor blob-2"></div>

    <div class="chat-container">
        <header>
            <div class="logo-area">
                <span class="fire-icon">🔥</span>
                <div>
                    <h1>ThermoAI</h1>
                    <p>Advanced Multimodal Intelligence</p>
                </div>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span> Online
            </div>
        </header>
        
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                Hello! I am your Multimodal Thermodynamics assistant. You can type, upload dynamic process diagrams/images, or record your voice directly!
            </div>
        </div>

        <div id="imagePreviewContainer" class="preview-container hidden">
            <div class="preview-wrapper">
                <img id="imagePreview" src="" alt="Upload Preview">
                <button id="removeImgBtn" class="remove-btn">&times;</button>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                
                <button id="uploadBtn" class="icon-action-btn" title="Upload Thermodynamic Diagram">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </button>

                <input type="text" id="userInput" placeholder="Ask a question or attach data..." autocomplete="off">
                
                <button id="micBtn" class="icon-action-btn" title="Record Voice">
                    <svg id="micIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>

                <button id="sendBtn" aria-label="Send Message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
